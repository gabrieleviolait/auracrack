name: Bug report
description: Report a reproducible problem without including sensitive data
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach credentials, packet captures, wordlists or third-party data.
  - type: dropdown
    id: module
    attributes:
      label: Module
      options: [Password Audit, Network Scanner, Traffic Monitor, Launcher, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or redacted values only.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.12, Npcap version
    validations:
      required: true
